[pytest]
# -v      : show each test name and PASS/FAIL on its own line
# -ra     : summary of all non-passing results at the end
# --tb=short : short, readable tracebacks on failure
addopts = -v -ra --tb=short
testpaths = tests
# add project root to import path so tests can `import pawpal_system`
# (lets bare `pytest` work, not just `python -m pytest`)
pythonpath = .
